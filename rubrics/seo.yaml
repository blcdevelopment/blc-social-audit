version: "phase1-seo-v1"
category: seo
max_score: 100
normalization: rescale_to_max
rules:
  - id: seo.collection.complete
    description: SEO facts were extracted successfully.
    weight: 4
    fact_path: seo.status
    evaluator: exact_match
    params:
      full_credit: complete

  - id: seo.title.present_all_pages
    description: Page titles are present across crawled pages.
    weight: 8
    fact_path: seo.summary.titles_present_pct
    evaluator: threshold
    params:
      min: 100
      partial_min: 80

  - id: seo.homepage_title.reasonable_length
    description: Homepage title length is in a useful search-result range.
    weight: 7
    fact_path: seo.pages[0].title.is_reasonable_length
    evaluator: boolean

  - id: seo.meta_description.present_all_pages
    description: Meta descriptions are present across crawled pages.
    weight: 10
    fact_path: seo.summary.meta_descriptions_present_pct
    evaluator: threshold
    params:
      min: 100
      partial_min: 70

  - id: seo.homepage_meta_description.reasonable_length
    description: Homepage meta description length is in a useful search-result range.
    weight: 8
    fact_path: seo.pages[0].meta_description.is_reasonable_length
    evaluator: boolean

  - id: seo.h1.present_once
    description: Crawled pages use one clear H1.
    weight: 9
    fact_path: seo.summary.h1_present_pct
    evaluator: threshold
    params:
      min: 100
      partial_min: 80

  - id: seo.homepage.canonical
    description: Homepage has a canonical URL.
    weight: 6
    fact_path: seo.pages[0].canonical
    evaluator: presence

  - id: seo.schema.present
    description: At least one crawled page includes schema markup.
    weight: 9
    fact_path: seo.summary.pages_with_schema
    evaluator: threshold
    params:
      min: 1

  - id: seo.images.alt_coverage
    description: Image alt-text coverage is strong across crawled pages.
    weight: 8
    fact_path: seo.summary.image_alt_coverage_pct
    evaluator: threshold
    params:
      min: 90
      partial_min: 60

  - id: seo.indexability.no_noindex_pages
    description: No crawled pages include a noindex directive.
    weight: 5
    fact_path: seo.summary.noindex_pages
    evaluator: exact_match
    params:
      full_credit: 0

  - id: seo.internal_links.depth
    description: Internal linking gives visitors and crawlers useful next steps.
    weight: 6
    fact_path: seo.summary.total_internal_links
    evaluator: threshold
    params:
      min: 5
      partial_min: 2

  - id: seo.psi.mobile_performance
    description: Mobile PageSpeed performance contributes to search and user experience.
    weight: 10
    fact_path: psi.summary.avg_mobile_performance
    evaluator: linear_scale
    skip_if_missing: true
    params:
      input_range: [0, 100]

  - id: seo.psi.desktop_performance
    description: Desktop PageSpeed performance is healthy.
    weight: 10
    fact_path: psi.summary.avg_desktop_performance
    evaluator: linear_scale
    skip_if_missing: true
    params:
      input_range: [0, 100]
