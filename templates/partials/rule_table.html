<table class="rules-table">
  <thead>
    <tr>
      <th>Rule</th>
      <th>Result</th>
      <th>Points</th>
      <th>Evidence</th>
    </tr>
  </thead>
  <tbody>
    {% for rule in rules %}
      <tr>
        <td>
          <strong>{{ rule.rule_id }}</strong>
          <span>{{ rule.description }}</span>
        </td>
        <td>{{ rule.result }}</td>
        <td>{{ "%.1f"|format(rule.points_awarded) }} / {{ "%.1f"|format(rule.points_possible) }}</td>
        <td>{{ rule.evidence_value or rule.reason or "N/A" }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
