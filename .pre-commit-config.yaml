# Vendored, third-party assets (e.g. the pinned axe-core build) are committed as-is: they
# must not be reformatted (end-of-file/whitespace) or counted against the large-file guard.
exclude: ^vendor/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: no-commit-to-branch
      - id: detect-private-key

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "100"]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--extend-ignore=E203,W503"]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python, pyi]

      - id: backend-tests
        name: backend tests
        entry: pytest
        language: system
        pass_filenames: false

      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -lc 'cd apps/frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: ^apps/frontend/
