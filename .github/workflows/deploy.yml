name: Deploy to production

# Continuous deployment.
#
# When a commit lands on `main` (i.e. a reviewed PR is merged — direct pushes
# are blocked by branch protection + protect-main.yml), SSH into the Linode box
# and roll the running production stack forward to that exact commit.
#
# CI (.github/workflows/pre-commit.yml) gates the pull request, so by the time a
# commit reaches `main` the checks have already passed — this workflow only runs
# *after* the merge. It does not re-run the tests; it just deploys.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DEPLOY_HOST         the box IP / hostname            (e.g. 173.255.206.170)
#   DEPLOY_USER         SSH user on the box              (e.g. abdullah)
#   DEPLOY_SSH_KEY      private key whose .pub is in the box's authorized_keys
#   DEPLOY_KNOWN_HOSTS  `ssh-keyscan <host>` output, to pin the box's host key
#   DEPLOY_PORT         optional SSH port (defaults to 22)
# See DEPLOYMENT.md "Continuous deployment" for the full setup.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow a manual re-deploy from the Actions tab

# One deploy at a time. Never cancel a deploy mid-flight (that could leave the
# box half-rolled); queue instead and converge on the newest commit.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Linode
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] \
             || [ -z "${DEPLOY_SSH_KEY}" ] || [ -z "${DEPLOY_KNOWN_HOSTS}" ]; then
            echo "::error::Missing deploy secrets. Set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_KNOWN_HOSTS."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          PORT="${DEPLOY_PORT:-22}"

          # Stream the committed deploy script to the box and run it there,
          # pinning the exact commit that triggered this run ($GITHUB_SHA, a
          # plain hex SHA from the runner env -- not interpolated, so no
          # injection surface). IdentitiesOnly keeps ssh from offering other
          # keys; StrictHostKeyChecking=yes enforces the pinned known_hosts.
          ssh -i ~/.ssh/deploy_key -p "${PORT}" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              'bash -s' -- "${GITHUB_SHA}" < deploy/deploy.sh
